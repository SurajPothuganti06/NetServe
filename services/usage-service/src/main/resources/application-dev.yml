# ─── Development Profile ─────────────────────────────────
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/netserve_usage
    username: netserve
    password: netserve_secret

  jpa:
    hibernate:
      ddl-auto: update

  data:
    redis:
      host: localhost
      port: 6379
      password: netserve_redis_secret

  kafka:
    bootstrap-servers: localhost:9092

netserve:
  jwt:
    secret: netserve-jwt-secret-key-that-is-at-least-256-bits-long-for-hs256

logging:
  level:
    "[com.netserve]": DEBUG
