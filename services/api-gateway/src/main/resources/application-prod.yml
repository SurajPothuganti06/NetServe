# ─── Production Profile ──────────────────────────────────
spring:
  cloud:
    gateway:
      globalcors:
        corsConfigurations:
          "[/**]":
            allowedOrigins: ${CORS_ALLOWED_ORIGIN}

      routes:
        - id: auth-service
          uri: ${AUTH_SERVICE_URL}
          predicates:
            - Path=/api/auth/**

        - id: customer-service
          uri: ${CUSTOMER_SERVICE_URL}
          predicates:
            - Path=/api/customers/**

        - id: subscription-service
          uri: ${SUBSCRIPTION_SERVICE_URL}
          predicates:
            - Path=/api/subscriptions/**,/api/plans/**

        - id: billing-service
          uri: ${BILLING_SERVICE_URL}
          predicates:
            - Path=/api/billing/**,/api/invoices/**

        - id: payment-service
          uri: ${PAYMENT_SERVICE_URL}
          predicates:
            - Path=/api/payments/**

        - id: usage-service
          uri: ${USAGE_SERVICE_URL}
          predicates:
            - Path=/api/usage/**,/api/devices/**

        - id: support-service
          uri: ${SUPPORT_SERVICE_URL}
          predicates:
            - Path=/api/tickets/**,/api/outages/**

        - id: notification-service
          uri: ${NOTIFICATION_SERVICE_URL}
          predicates:
            - Path=/api/notifications/**

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}

netserve:
  jwt:
    secret: ${JWT_SECRET}

logging:
  level:
    "[com.netserve]": INFO
    "[org.springframework.cloud.gateway]": WARN
