server:
  port: 8080

spring:
  profiles:
    active: dev
  application:
    name: api-gateway

  cloud:
    gateway:
      globalcors:
        corsConfigurations:
          "[/**]":
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowedOriginPatterns: "*"
            allowCredentials: true

# Public paths (shared across profiles)
netserve:
  gateway:
    public-paths:
      - /api/auth/register
      - /api/auth/login
      - /api/auth/refresh
      - /api/auth/forgot-password
      - /api/auth/reset-password
      - /api/customers/service-availability/**
