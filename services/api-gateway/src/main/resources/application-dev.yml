# ─── Development Profile ─────────────────────────────────
spring:
  cloud:
    gateway:
      globalcors:
        corsConfigurations:
          "[/**]":
            allowedOriginPatterns: "*"

      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**

        - id: customer-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/customers/**

        - id: subscription-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/subscriptions/**,/api/plans/**

        - id: billing-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/billing/**,/api/invoices/**

        - id: payment-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/payments/**

        - id: usage-service
          uri: http://localhost:8086
          predicates:
            - Path=/api/usage/**,/api/devices/**

        - id: support-service
          uri: http://localhost:8087
          predicates:
            - Path=/api/tickets/**,/api/outages/**

        - id: notification-service
          uri: http://localhost:8088
          predicates:
            - Path=/api/notifications/**

  data:
    redis:
      host: localhost
      port: 6379
      password: netserve_redis

netserve:
  jwt:
    secret: netserve-jwt-secret-key-that-is-at-least-256-bits-long-for-hs256

logging:
  level:
    "[com.netserve]": DEBUG
    "[org.springframework.cloud.gateway]": DEBUG
