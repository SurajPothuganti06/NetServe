# ─── NetServe Production Docker Compose ──────────────────────────
# Usage: docker compose -f docker-compose.prod.yml --env-file .env up -d
#
# Prerequisites:
#   1. Copy .env.example → .env and fill in production values
#   2. Build service images first:
#      docker build --build-arg SERVICE_NAME=auth-service -f services/Dockerfile -t netserve/auth-service .
#      (repeat for all services)
#   3. Build frontend:
#      docker build --build-arg NEXT_PUBLIC_API_URL=$NEXT_PUBLIC_API_URL -f frontend/Dockerfile -t netserve/frontend frontend/

version: "3.9"

services:
  # ═══════════════════════════════════════════════════════════
  # Infrastructure
  # ═══════════════════════════════════════════════════════════

  postgres:
    image: postgres:16-alpine
    container_name: netserve-postgres
    restart: always
    environment:
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: netserve_auth
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./services/infrastructure/init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER} -d netserve_auth"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - netserve

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: netserve-zookeeper
    restart: always
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "echo", "ruok", "|", "nc", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - netserve

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: netserve-kafka
    restart: always
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: DOCKER://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: DOCKER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: DOCKER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - netserve

  kafka-init:
    image: confluentinc/cp-kafka:7.6.0
    container_name: netserve-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: |
      "
      echo 'Creating Kafka topics...'
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic subscription-activated --partitions 3 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic invoice-generated --partitions 3 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic payment-successful --partitions 3 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic usage-threshold-exceeded --partitions 3 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic outage-declared --partitions 3 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic customer-created --partitions 3 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic customer-status-changed --partitions 3 --replication-factor 1
      echo 'Topics created.'
      "
    networks:
      - netserve

  redis:
    image: redis:7-alpine
    container_name: netserve-redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - netserve

  # ═══════════════════════════════════════════════════════════
  # Backend Microservices
  # ═══════════════════════════════════════════════════════════

  auth-service:
    image: netserve/auth-service
    container_name: netserve-auth
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DATABASE_URL: jdbc:postgresql://postgres:5432/netserve_auth
      DATABASE_USER: ${DATABASE_USER}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
    networks:
      - netserve

  customer-service:
    image: netserve/customer-service
    container_name: netserve-customer
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DATABASE_URL: jdbc:postgresql://postgres:5432/netserve_customer
      DATABASE_USER: ${DATABASE_USER}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      JWT_SECRET: ${JWT_SECRET}
    networks:
      - netserve

  subscription-service:
    image: netserve/subscription-service
    container_name: netserve-subscription
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DATABASE_URL: jdbc:postgresql://postgres:5432/netserve_subscription
      DATABASE_USER: ${DATABASE_USER}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      JWT_SECRET: ${JWT_SECRET}
    networks:
      - netserve

  billing-service:
    image: netserve/billing-service
    container_name: netserve-billing
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DATABASE_URL: jdbc:postgresql://postgres:5432/netserve_billing
      DATABASE_USER: ${DATABASE_USER}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      JWT_SECRET: ${JWT_SECRET}
    networks:
      - netserve

  payment-service:
    image: netserve/payment-service
    container_name: netserve-payment
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DATABASE_URL: jdbc:postgresql://postgres:5432/netserve_payment
      DATABASE_USER: ${DATABASE_USER}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      JWT_SECRET: ${JWT_SECRET}
    networks:
      - netserve

  usage-service:
    image: netserve/usage-service
    container_name: netserve-usage
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DATABASE_URL: jdbc:postgresql://postgres:5432/netserve_usage
      DATABASE_USER: ${DATABASE_USER}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      JWT_SECRET: ${JWT_SECRET}
    networks:
      - netserve

  support-service:
    image: netserve/support-service
    container_name: netserve-support
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DATABASE_URL: jdbc:postgresql://postgres:5432/netserve_support
      DATABASE_USER: ${DATABASE_USER}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      JWT_SECRET: ${JWT_SECRET}
    networks:
      - netserve

  notification-service:
    image: netserve/notification-service
    container_name: netserve-notification
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DATABASE_URL: jdbc:postgresql://postgres:5432/netserve_notification
      DATABASE_USER: ${DATABASE_USER}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      JWT_SECRET: ${JWT_SECRET}
    networks:
      - netserve

  # ═══════════════════════════════════════════════════════════
  # API Gateway + Frontend
  # ═══════════════════════════════════════════════════════════

  api-gateway:
    image: netserve/api-gateway
    container_name: netserve-gateway
    restart: always
    depends_on:
      redis:
        condition: service_healthy
      auth-service:
        condition: service_started
      customer-service:
        condition: service_started
      subscription-service:
        condition: service_started
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ALLOWED_ORIGIN: ${CORS_ALLOWED_ORIGIN}
      AUTH_SERVICE_URL: http://auth-service:8081
      CUSTOMER_SERVICE_URL: http://customer-service:8082
      SUBSCRIPTION_SERVICE_URL: http://subscription-service:8083
      BILLING_SERVICE_URL: http://billing-service:8084
      PAYMENT_SERVICE_URL: http://payment-service:8085
      USAGE_SERVICE_URL: http://usage-service:8086
      SUPPORT_SERVICE_URL: http://support-service:8087
      NOTIFICATION_SERVICE_URL: http://notification-service:8088
    networks:
      - netserve

  frontend:
    image: netserve/frontend
    container_name: netserve-frontend
    restart: always
    depends_on:
      - api-gateway
    ports:
      - "3000:3000"
    networks:
      - netserve

volumes:
  postgres_data:
  redis_data:

networks:
  netserve:
    driver: bridge
